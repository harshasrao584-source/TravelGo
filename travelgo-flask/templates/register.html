{% extends "base.html" %}
{% block title %}TravelGo — Register{% endblock %}

{% block extra_css %}
<style>
  .auth-wrap { max-width: 480px; margin: 0 auto; }
  .auth-card { background: #fff; border-radius: 18px; padding: 44px 40px; box-shadow: 0 8px 40px rgba(10,22,40,0.12); }
  .auth-header { text-align: center; margin-bottom: 32px; }
  .auth-header h1 { font-size: 30px; color: #0A1628; margin-bottom: 8px; }
  .auth-header p  { font-size: 14px; color: #6B7A8D; }
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: #4A6A8A; margin-bottom: 7px; }
  .form-group input {
    width: 100%; padding: 12px 16px; border: 1.5px solid #D0DCE8;
    border-radius: 9px; font-size: 14px; font-family: 'Inter', sans-serif;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s; background: #F8FAFC;
  }
  .form-group input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(13,122,138,0.1); background: #fff; }
  .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: #6B7A8D; }
  .auth-footer a { color: var(--teal); font-weight: 600; text-decoration: none; }
  .auth-footer a:hover { text-decoration: underline; }
  .divider { border: none; border-top: 1px solid #E8EEF4; margin: 24px 0; }
  .aws-badge { display: flex; align-items: center; gap: 8px; justify-content: center; font-size: 12px; color: #8A9AAA; padding-top: 4px; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <div style="font-size:36px; margin-bottom:12px;">✈</div>
      <h1>Create Account</h1>
      <p>Join TravelGo and start booking your dream trips</p>
    </div>

    <form method="POST" action="{{ url_for('register') }}">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="John Doe" required autofocus/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Minimum 6 characters" required/>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" name="phone" placeholder="+1 234 567 8900" required/>
      </div>
      <button type="submit" class="btn btn-teal btn-full" style="margin-top:8px; font-size:14px; padding:14px;">
        Create Account
      </button>
    </form>

    <hr class="divider"/>
    <div class="aws-badge">
      🔒 &nbsp;Your data is secured with AWS DynamoDB
    </div>
    <div class="auth-footer" style="margin-top:16px;">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
